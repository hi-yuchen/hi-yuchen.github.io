<!doctype html>
<html lang="en" data-lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f7f5f0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}Yu Chen</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}Yu Chen">
    <meta property="og:description" content="{{ page.description | default: site.description | escape }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:image" content="{{ '/images/og.png' | absolute_url }}">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="{{ '/assets/css/academic.css' | relative_url }}">
    <script>
      try {
        const savedLanguage = localStorage.getItem("yu-chen-language");
        if (savedLanguage === "zh") document.documentElement.dataset.lang = "zh";
      } catch (_) {}
    </script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">
      <span class="lang-en">Skip to main content</span>
      <span class="lang-zh">跳到正文</span>
    </a>
    <header class="site-header">
      <div class="header-inner">
        <a class="site-name" href="{{ '/' | relative_url }}" aria-label="Yu Chen home">
          <span>Yu Chen</span>
          <span class="site-name-cn">陈宇</span>
        </a>
        <div class="header-tools">
          <nav aria-label="Primary navigation">
            <ul class="nav-list">
              {% for item in site.data.navigation %}
                <li>
                  <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="active" aria-current="page"{% endif %}>
                    <span class="lang-en">{{ item.en }}</span>
                    <span class="lang-zh">{{ item.zh }}</span>
                  </a>
                </li>
              {% endfor %}
            </ul>
          </nav>
          <div class="language-switch" aria-label="Language">
            <button type="button" data-language="en" aria-pressed="true">EN</button>
            <span aria-hidden="true">/</span>
            <button type="button" data-language="zh" aria-pressed="false">中</button>
          </div>
        </div>
      </div>
    </header>

    {{ content }}

    <footer class="site-footer">
      <div class="footer-inner">
        <p>© {{ site.time | date: '%Y' }} Yu Chen</p>
        <p>
          <span class="lang-en">School of Public Administration, ZUFE</span>
          <span class="lang-zh">浙江财经大学公共管理学院</span>
        </p>
      </div>
    </footer>
    <script src="{{ '/assets/js/language.js' | relative_url }}" defer></script>
  </body>
</html>
