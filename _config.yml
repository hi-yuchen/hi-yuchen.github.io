title: "Yu Chen | 陈宇"
name: "Yu Chen"
description: "Academic website of Yu Chen, Lecturer at Zhejiang University of Finance and Economics."
url: "https://hi-yuchen.github.io"
baseurl: ""
locale: "en-US"
timezone: "Asia/Shanghai"

author:
  name: "Yu Chen"
  name_zh: "陈宇"
  role: "Lecturer, School of Public Administration"
  role_zh: "浙江财经大学公共管理学院讲师"
  institution: "Zhejiang University of Finance and Economics"
  institution_zh: "浙江财经大学"
  email: "yu.chen@zufe.edu.cn"
  avatar: "/images/yu-chen.jpg"

research_interests:
  - en: "Long-term Care"
    zh: "长期护理"
  - en: "Health Economics"
    zh: "健康经济学"
  - en: "Labor Economics"
    zh: "劳动经济学"

include:
  - _pages

exclude:
  - docs
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - vendor

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: academic

markdown: kramdown
permalink: pretty
plugins:
  - jekyll-sitemap

kramdown:
  input: GFM
  hard_wrap: false
  smart_quotes: lsquo,rsquo,ldquo,rdquo
